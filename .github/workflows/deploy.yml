name: Build & Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        env:
          ASTRO_SITE: https://soulmarket.es
          STRAPI_URL: https://blog.soulmarket.es
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
        run: pnpm build

      - name: Deploy to VPS via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_TARGET_PATH: ${{ secrets.SSH_TARGET_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 2222 -H "$SSH_HOST" >> ~/.ssh/known_hosts
          rsync -rlvz --delete --no-perms --no-owner --no-group -e "ssh -p 2222 -i ~/.ssh/id_ed25519" dist/ "$SSH_USER@$SSH_HOST:$SSH_TARGET_PATH/"

      - name: Notify on success
        if: success()
        run: echo "✅ Deployed to ${{ secrets.SSH_HOST }} successfully"
